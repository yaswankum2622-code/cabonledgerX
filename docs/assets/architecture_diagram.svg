<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1260" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1A2B"/>
      <stop offset="1" stop-color="#13273D"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172E49"/>
      <stop offset="1" stop-color="#1B3959"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3AA6FF"/>
      <stop offset="1" stop-color="#1D6FFF"/>
    </linearGradient>
    <linearGradient id="accentTeal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3CD6C5"/>
      <stop offset="1" stop-color="#1FA68B"/>
    </linearGradient>
    <linearGradient id="accentAmber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F5C76A"/>
      <stop offset="1" stop-color="#D59A22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#06101A" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #F5F8FC; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #AAC4DC; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #F7FAFD; }
      .label { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #EFF5FB; }
      .body { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #BED0E0; }
      .small { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #DCE8F2; letter-spacing: 0.08em; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1400" height="860" rx="32" fill="url(#bg)"/>

  <text x="80" y="82" class="title">TargetTruth / CarbonLedgerX Architecture</text>
  <text x="80" y="114" class="subtitle">Portfolio-scale climate commitment intelligence from raw factors to dashboard, API, and evidence packs</text>

  <rect x="70" y="160" width="270" height="210" rx="24" fill="url(#panel)" stroke="#33597F" filter="url(#shadow)"/>
  <rect x="92" y="184" width="82" height="10" rx="5" fill="url(#accentBlue)"/>
  <text x="92" y="223" class="section">Source Inputs</text>
  <text x="92" y="262" class="label">Raw workbooks and source files</text>
  <text x="92" y="289" class="body">• eGRID 2022/2023</text>
  <text x="92" y="312" class="body">• DEFRA 2025 flat + full set</text>
  <text x="92" y="335" class="body">• SBTi companies + targets</text>
  <text x="92" y="358" class="body">• methodology PDF references</text>

  <rect x="390" y="160" width="290" height="210" rx="24" fill="url(#panel)" stroke="#33597F" filter="url(#shadow)"/>
  <rect x="412" y="184" width="82" height="10" rx="5" fill="url(#accentTeal)"/>
  <text x="412" y="223" class="section">Ingestion + Canonicalization</text>
  <text x="412" y="262" class="label">Parsers and structured table builders</text>
  <text x="412" y="289" class="body">• workbook profiling + extraction</text>
  <text x="412" y="312" class="body">• interim parquet normalization</text>
  <text x="412" y="335" class="body">• processed factor and commitment tables</text>
  <text x="412" y="358" class="body">• synthetic company panel generation</text>

  <rect x="730" y="160" width="290" height="210" rx="24" fill="url(#panel)" stroke="#33597F" filter="url(#shadow)"/>
  <rect x="752" y="184" width="82" height="10" rx="5" fill="url(#accentAmber)"/>
  <text x="752" y="223" class="section">Calculation + Reconstruction</text>
  <text x="752" y="262" class="label">Transparent emissions modeling layer</text>
  <text x="752" y="289" class="body">• factor mapping by geography + sector</text>
  <text x="752" y="312" class="body">• activity-based calculator</text>
  <text x="752" y="335" class="body">• annual history reconstruction 2015–2024</text>
  <text x="752" y="358" class="body">• baseline comparison and audit fields</text>

  <rect x="1060" y="160" width="270" height="210" rx="24" fill="url(#panel)" stroke="#33597F" filter="url(#shadow)"/>
  <rect x="1082" y="184" width="82" height="10" rx="5" fill="url(#accentBlue)"/>
  <text x="1082" y="223" class="section">Forecasting + Evaluation</text>
  <text x="1082" y="262" class="label">Dual forecasting strategy</text>
  <text x="1082" y="289" class="body">• deterministic forecast through 2030</text>
  <text x="1082" y="312" class="body">• statistical forecast selection</text>
  <text x="1082" y="335" class="body">• walk-forward backtesting</text>
  <text x="1082" y="358" class="body">• calibration and metric artifacts</text>

  <rect x="150" y="470" width="320" height="220" rx="24" fill="url(#panel)" stroke="#33597F" filter="url(#shadow)"/>
  <text x="176" y="507" class="small">Decision Intelligence</text>
  <text x="176" y="548" class="section">Assessment + Scoring</text>
  <text x="176" y="585" class="body">• target assessment vs modeled trajectory</text>
  <text x="176" y="608" class="body">• contradiction engine</text>
  <text x="176" y="631" class="body">• heuristic risk + credibility scores</text>
  <text x="176" y="654" class="body">• probabilistic miss scoring</text>
  <text x="176" y="677" class="body">• scoring reconciliation + audit layer</text>

  <rect x="540" y="470" width="320" height="220" rx="24" fill="url(#panel)" stroke="#33597F" filter="url(#shadow)"/>
  <text x="566" y="507" class="small">Action Layer</text>
  <text x="566" y="548" class="section">Interventions + Evidence</text>
  <text x="566" y="585" class="body">• intervention simulation scenarios</text>
  <text x="566" y="608" class="body">• MAC-style ranking</text>
  <text x="566" y="631" class="body">• intervention intelligence summaries</text>
  <text x="566" y="654" class="body">• board / investor / lender evidence packs</text>
  <text x="566" y="677" class="body">• markdown evidence index</text>

  <rect x="930" y="470" width="320" height="220" rx="24" fill="url(#panel)" stroke="#33597F" filter="url(#shadow)"/>
  <text x="956" y="507" class="small">Product Surfaces</text>
  <text x="956" y="548" class="section">Dashboard + API</text>
  <text x="956" y="585" class="body">• premium Streamlit intelligence console</text>
  <text x="956" y="608" class="body">• thin FastAPI read-only service</text>
  <text x="956" y="631" class="body">• parquet-backed data access layer</text>
  <text x="956" y="654" class="body">• screenshot-ready portfolio presentation</text>
  <text x="956" y="677" class="body">• recruiter and interview-facing docs</text>

  <path d="M340 265H390" stroke="#76B7F7" stroke-width="5" stroke-linecap="round"/>
  <path d="M680 265H730" stroke="#76B7F7" stroke-width="5" stroke-linecap="round"/>
  <path d="M1020 265H1060" stroke="#76B7F7" stroke-width="5" stroke-linecap="round"/>

  <path d="M875 370V430" stroke="#4CC4B4" stroke-width="5" stroke-linecap="round"/>
  <path d="M875 430H310V470" stroke="#4CC4B4" stroke-width="5" stroke-linecap="round"/>
  <path d="M875 430H700V470" stroke="#4CC4B4" stroke-width="5" stroke-linecap="round"/>
  <path d="M875 430H1090V470" stroke="#4CC4B4" stroke-width="5" stroke-linecap="round"/>

  <circle cx="340" cy="265" r="7" fill="#76B7F7"/>
  <circle cx="390" cy="265" r="7" fill="#76B7F7"/>
  <circle cx="680" cy="265" r="7" fill="#76B7F7"/>
  <circle cx="730" cy="265" r="7" fill="#76B7F7"/>
  <circle cx="1020" cy="265" r="7" fill="#76B7F7"/>
  <circle cx="1060" cy="265" r="7" fill="#76B7F7"/>
  <circle cx="875" cy="370" r="7" fill="#4CC4B4"/>
  <circle cx="875" cy="430" r="7" fill="#4CC4B4"/>

  <rect x="70" y="740" width="1260" height="70" rx="20" fill="#112338" stroke="#33597F"/>
  <text x="100" y="782" class="body">Public repo surface: code, docs, ADRs, tests, curated screenshots. Local-only artifacts such as raw data, parquet layers, and outputs remain gitignored for clean portfolio publication.</text>
</svg>
